<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoList - Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;510;590;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/linear-theme.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/date-group.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">ToDoList</h1>
            </div>
            
            <button class="btn btn-primary btn-block" id="btn-new-task">
                <span class="icon">+</span> 新建任务
            </button>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-label">筛选</div>
                    <ul class="nav-list">
                        <li class="nav-item active" data-view="all">
                            <span class="nav-icon">○</span> 全部任务
                        </li>
                        <li class="nav-item" data-view="today">
                            <span class="nav-icon">◐</span> 今日待办
                        </li>
                        <li class="nav-item" data-view="upcoming">
                            <span class="nav-icon">◑</span> 未来任务
                        </li>
                        <li class="nav-item" data-view="no-date">
                            <span class="nav-icon">○</span> 无截止日期
                        </li>
                        <li class="nav-item" data-view="priority-high">
                            <span class="nav-icon">●</span> 高优先级
                        </li>
                    </ul>
                </div>
                
                <div class="nav-section">
                    <div class="nav-label">管理</div>
                    <ul class="nav-list">
                        <li class="nav-item" data-view="completed">
                            <span class="nav-icon">✓</span> 已完成
                        </li>
                        <li class="nav-item" data-view="trash">
                            <span class="nav-icon">🗑</span> 回收站
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h2 class="page-title" id="page-title">全部任务</h2>
                <div class="header-actions">
                    <button class="btn btn-ghost" id="btn-refresh">刷新</button>
                </div>
            </header>
            
            <!-- Task List Container -->
            <div class="task-container" id="task-container">
                <!-- Tasks will be rendered here -->
            </div>
        </main>
    </div>
    
    <!-- Task Modal -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">新建任务</h3>
                <button class="btn btn-icon btn-close" id="btn-close-modal">×</button>
            </div>
            <div class="modal-body">
                <form id="task-form">
                    <input type="hidden" id="task-id">
                    
                    <div class="form-group">
                        <label class="form-label">任务内容 *</label>
                        <input type="text" class="form-input" id="task-content" 
                               placeholder="输入任务内容..." required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <textarea class="form-textarea" id="task-description" 
                                  placeholder="添加描述..."></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">截止日期</label>
                            <input type="date" class="form-input" id="task-due-date">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">优先级</label>
                            <select class="form-select" id="task-priority">
                                <option value="1">P1 - 最低</option>
                                <option value="2" selected>P2 - 普通</option>
                                <option value="3">P3 - 重要</option>
                                <option value="4">P4 - 紧急</option>
                            </select>
                        </div>
                    </div>
                </form>
                
                <!-- Subtasks Section -->
                <div class="subtasks-section" id="subtasks-section" style="display: none;">
                    <div class="section-header">
                        <h4 class="section-title">子任务</h4>
                        <button class="btn btn-sm btn-ghost" id="btn-add-subtask">+ 添加子任务</button>
                    </div>
                    <div class="subtasks-list" id="subtasks-list"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="btn-cancel">取消</button>
                <button class="btn btn-primary" id="btn-save">保存</button>
            </div>
        </div>
    </div>
    
    <!-- Subtask Modal -->
    <div class="modal-overlay" id="subtask-modal">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 class="modal-title">添加子任务</h3>
                <button class="btn btn-icon btn-close" id="btn-close-subtask-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">子任务内容</label>
                    <input type="text" class="form-input" id="subtask-content" 
                           placeholder="输入子任务内容...">
                </div>
                <div class="form-group">
                    <label class="form-label">优先级</label>
                    <select class="form-select" id="subtask-priority">
                        <option value="1">P1</option>
                        <option value="2" selected>P2</option>
                        <option value="3">P3</option>
                        <option value="4">P4</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="btn-cancel-subtask">取消</button>
                <button class="btn btn-primary" id="btn-save-subtask">添加</button>
            </div>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>
    
    <script src="/static/js/api.js"></script>
    <script src="/static/js/uiComponents.js"></script>
    <script src="/static/js/dateGroup.js"></script>
    <script src="/static/js/taskManager.js"></script>
    <script src="/static/js/completed.js"></script>
    <script src="/static/js/trash.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>

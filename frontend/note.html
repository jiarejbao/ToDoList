<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtask Note - ToDoList</title>
    <link rel="stylesheet" href="/static/css/linear-theme.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/note-editor.css">
</head>
<body style="background:#08090a;margin:0;min-height:100vh;">
    <div class="note-page">
        <!-- Header -->
        <div class="note-page-header">
            <div>
                <h1 id="note-title">Loading...</h1>
                <div id="note-meta" class="note-page-meta"></div>
            </div>
            <a id="btn-back-to-task" href="/" class="btn-ghost">← Back to Task</a>
        </div>

        <!-- Editor -->
        <div id="note-editor-wrapper" style="min-height:500px;"></div>
    </div>

    <!-- Shared utilities -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/uiComponents.js"></script>
    <!-- Note page modules -->
    <script src="/static/js/noteEditor.js"></script>
    <script src="/static/js/subtaskNote.js"></script>
</body>
</html>
